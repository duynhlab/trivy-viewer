apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "trivy-viewer.fullname" . }}-server
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "trivy-viewer.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  replicas: {{ .Values.server.replicaCount }}
  selector:
    matchLabels:
      {{- include "trivy-viewer.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        {{- include "trivy-viewer.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: server
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "trivy-viewer.serverServiceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: server
          image: {{ include "trivy-viewer.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["--mode=server"]
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            - name: MODE
              value: server
            - name: SERVER_PORT
              value: {{ .Values.server.port | quote }}
            - name: HEALTH_PORT
              value: {{ .Values.metricsPort | quote }}
            - name: STORAGE_PATH
              value: /data
            - name: LOG_FORMAT
              value: {{ .Values.log.format | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.log.level | quote }}
            - name: HUB_SECRET_NAMESPACE
              value: {{ .Values.hubSecretNamespace | default .Release.Namespace | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.server.port }}
            - name: metrics
              containerPort: {{ .Values.metricsPort }}
          livenessProbe:
            httpGet: {path: /healthz, port: metrics}
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet: {path: /readyz, port: metrics}
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            {{- toYaml .Values.server.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "trivy-viewer.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp
          emptyDir: {}
      {{- with .Values.server.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.server.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.server.affinity }}
      affinity:
        {{- toYaml .Values.server.affinity | nindent 8 }}
      {{- else if eq .Values.persistence.accessMode "ReadWriteOnce" }}
      # Co-locate with the scraper so both can mount the same RWO PVC.
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  {{- include "trivy-viewer.selectorLabels" . | nindent 18 }}
                  app.kubernetes.io/component: scraper
              topologyKey: kubernetes.io/hostname
      {{- end }}

{{- if .Values.serviceAccount.create }}
{{- if .Values.serviceAccount.name }}
# Single shared ServiceAccount (user-supplied name overrides the
# per-component split).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "trivy-viewer.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- else }}
# One ServiceAccount per component so each holds only the RBAC it needs:
# the server writes registration Secrets, the scraper reads them and the
# Trivy CRDs (see rbac.yaml).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "trivy-viewer.serverServiceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "trivy-viewer.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "trivy-viewer.scraperServiceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "trivy-viewer.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}

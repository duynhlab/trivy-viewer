{{- if .Values.serviceMonitor.enabled }}
{{- range $component := (list "server" "scraper") }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "trivy-viewer.fullname" $ }}-{{ $component }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "trivy-viewer.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $component }}
    {{- with $.Values.serviceMonitor.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "trivy-viewer.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: {{ $component }}
  endpoints:
    - port: metrics
      path: /metrics
      interval: {{ $.Values.serviceMonitor.interval }}
---
{{- end }}
{{- end }}

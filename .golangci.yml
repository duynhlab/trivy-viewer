version: "2"

run:
  build-tags:
    - e2e

linters:
  # errcheck, govet, ineffassign, staticcheck, unused are enabled by default in v2.
  enable:
    - misspell
    - unconvert
  settings:
    errcheck:
      exclude-functions:
        # Close error on a read-only *sql.Rows carries no signal; rows.Err() is checked instead.
        - (*database/sql.Rows).Close
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports

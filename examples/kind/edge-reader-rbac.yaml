# Read-only registration footprint applied on each Edge cluster.
apiVersion: v1
kind: Namespace
metadata:
  name: trivy-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: trivy-viewer-reader
  namespace: trivy-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: trivy-viewer-reader
rules:
  - apiGroups: ["aquasecurity.github.io"]
    resources: ["vulnerabilityreports", "sbomreports"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: trivy-viewer-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: trivy-viewer-reader
subjects:
  - kind: ServiceAccount
    name: trivy-viewer-reader
    namespace: trivy-system
---
apiVersion: v1
kind: Secret
metadata:
  name: trivy-viewer-reader-token
  namespace: trivy-system
  annotations:
    kubernetes.io/service-account.name: trivy-viewer-reader
type: kubernetes.io/service-account-token

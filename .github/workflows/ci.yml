name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "26"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v3.16.4

      - parallel:
          - name: go vet
            run: go vet ./...

          - name: Unit tests with coverage
            run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

          - name: Web UI build
            working-directory: web
            run: |
              npm ci
              npm audit --audit-level=high
              npm run build

          - name: Helm lint and template
            run: |
              helm lint charts/trivy-viewer
              helm template test charts/trivy-viewer \
                --set image.repository=trivy-viewer \
                --set image.tag=ci > /dev/null

      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.12.2

      - name: Coverage summary
        run: |
          go tool cover -func=coverage.out | tail -1
          echo "## Coverage" >> "$GITHUB_STEP_SUMMARY"
          go tool cover -func=coverage.out | tail -1 >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: coverage.out

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - uses: azure/setup-helm@v5
        with:
          version: v3.16.4

      - parallel:
          - name: go vet
            run: go vet ./...

          - name: Unit tests with coverage
            run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

          - name: Web UI build
            working-directory: web
            run: |
              npm ci
              npm audit --audit-level=high
              npm run build

          - name: Helm lint and template
            run: |
              helm lint charts/trivy-viewer
              helm template test charts/trivy-viewer \
                --set image.repository=trivy-viewer \
                --set image.tag=ci > /dev/null

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

      - name: Coverage summary
        run: |
          go tool cover -func=coverage.out | tail -1
          echo "## Coverage" >> "$GITHUB_STEP_SUMMARY"
          go tool cover -func=coverage.out | tail -1 >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out
